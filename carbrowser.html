<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Auto Hub - Server Vehicle Directory</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for GTA Vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        gta: ['"Bebas Neue"', 'cursive'],
                        sans: ['"Chakra Petch"', 'sans-serif'],
                    },
                    colors: {
                        gta: {
                            dark: '#0a0a0c',
                            panel: '#15171e',
                            green: '#4ade80', // Classic money/health green
                            orange: '#ff7b00',
                            border: '#2a2d3a'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0a0c;
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                url('https://www.transparenttextures.com/patterns/cubes.png');
            color: #e2e8f0;
            overflow-y: scroll;
        }

        /* Main Page Vertical Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0c;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2d3a;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4ade80;
        }

        /* Horizontal Scrollbar specifically for Categories */
        #categoryContainer::-webkit-scrollbar {
            height: 6px;
        }
        #categoryContainer::-webkit-scrollbar-track {
            background: #15171e;
            border-radius: 10px;
        }
        #categoryContainer::-webkit-scrollbar-thumb {
            background: #4ade80;
            border-radius: 10px;
        }
        #categoryContainer::-webkit-scrollbar-thumb:hover {
            background: #22c55e;
        }

        /* Slanted GTA Style Elements */
        .gta-skew {
            transform: skewX(-10deg);
        }
        .gta-unskew {
            transform: skewX(10deg);
        }

        .vehicle-card {
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }
        
        .vehicle-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background-color: #4ade80;
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.3s ease;
        }

        .vehicle-card:hover::before {
            transform: scaleY(1);
        }

        .vehicle-card:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
            box-shadow: 0 10px 20px -5px rgba(74, 222, 128, 0.1);
        }

        /* Toast notification */
        #toast {
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.3s linear;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen font-sans pb-16">

    <!-- Header / Banner -->
    <header class="bg-gta-panel border-b border-gta-border shadow-2xl relative overflow-hidden">

        <div class="max-w-7xl mx-auto px-4 py-8 relative z-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-gta-green text-gta-dark p-3 rounded-lg gta-skew shadow-[0_0_15px_rgba(74,222,128,0.3)]">
                        <i class="fa-solid fa-car-side text-3xl gta-unskew"></i>
                    </div>
                    <div>
                        <h1 class="text-5xl font-gta tracking-wider text-white uppercase drop-shadow-lg">
                            Los Santos <span class="text-gta-green">Auto Hub</span>
                        </h1>
                        <p class="text-slate-400 font-semibold tracking-wide uppercase text-sm mt-1">
                            <i class="fa-solid fa-server mr-1"></i> Authorized Dealer & Spawn Directory
                        </p>
                    </div>
                </div>

                <!-- Search Box -->
                <div class="w-full md:w-96 relative gta-skew">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none gta-unskew">
                        <i class="fa-solid fa-search text-gta-green"></i>
                    </div>
                    <input 
                        type="text"

                        placeholder="Search Vehicles or Codes..."
                    >
                </div>
            </div>
        </div>
    </header>

    <!-- Categories / Brands Filter -->
    <div class="max-w-7xl mx-auto px-4 mt-8">
        <div class="flex items-center gap-3 mb-4">
            <i class="fa-solid fa-filter text-slate-500"></i>
            <h3 class="text-slate-400 font-gta text-2xl tracking-wide">Filter by Brand</h3>
        </div>
        <!-- Note: no-scrollbar is removed, flex-shrink-0 added in JS -->
        <div class="flex overflow-x-auto pb-4 gap-3 scroll-smooth" id="categoryContainer">
            <!-- Categories injected here -->
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 mt-6" id="vehiclesContainer">

    <!-- Toast Notification -->

        // State
        let currentSearch = '';
        let currentCategory = 'All';

        // Extract unique categories and sort them (Keeping Custom Pack first)
        const rawCategories = [...new Set(vehicleData.map(v => v.category))];
        const sortedCategories = rawCategories.sort((a, b) => {
            if (a === 'Custom Pack') return -1;
            if (b === 'Custom Pack') return 1;
            return a.localeCompare(b);
        });
        const categories = ['All', ...sortedCategories];

        // DOM Elements
        const searchInput = document.getElementById('searchInput');
        const categoryContainer = document.getElementById('categoryContainer');
        const vehiclesContainer = document.getElementById('vehiclesContainer');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase();
            renderVehicles();
        });

        // Mouse Wheel Horizontal Scroll Event
        categoryContainer.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault(); // Stop vertical scroll on page
                categoryContainer.scrollLeft += e.deltaY > 0 ? 100 : -100;
            }
        }, { passive: false });

        // Initialize App
        function init() {
            renderCategories();
            renderVehicles();
        }

        // Render Category Filter Buttons
        function renderCategories() {
            categoryContainer.innerHTML = categories.map(cat => {
                const isActive = cat === currentCategory;
                // ADDED flex-shrink-0 to prevent squishing
                const baseClasses = "flex-shrink-0 px-6 py-2 rounded-sm font-bold uppercase tracking-wider text-sm whitespace-nowrap transition-all border-2 gta-skew cursor-pointer select-none flex items-center gap-2";
                const activeClasses = isActive 
                    ? "bg-gta-green border-gta-green text-gta-dark shadow-[0_0_15px_rgba(74,222,128,0.2)]" 
                    : "bg-gta-panel border-gta-border text-slate-400 hover:border-slate-500 hover:text-white";
                
                return `
                    <div class="${baseClasses} ${activeClasses}" onclick="setCategory('${cat}')">
                        <span class="gta-unskew block">${cat}</span>
                    </div>
                `;
            }).join('');
        }

        // Set Category and Re-render
        window.setCategory = (cat) => {
            currentCategory = cat;
            renderCategories();
            renderVehicles();
        }

        // Get Icon based on Category
        function getIconForCategory(cat) {
            if (cat === 'Aviation') return '<i class="fa-solid fa-plane"></i>';
            if (cat === 'Boats') return '<i class="fa-solid fa-ship"></i>';
            if (cat === 'Motorcycles') return '<i class="fa-solid fa-motorcycle"></i>';
            return '<i class="fa-solid fa-car"></i>';
        }

        // Render Vehicles Grouped by Brand
        function renderVehicles() {
            // Filter Data
            const filtered = vehicleData.filter(v => {
                const matchesSearch = v.name.toLowerCase().includes(currentSearch) || v.spawn.toLowerCase().includes(currentSearch);
                const matchesCategory = currentCategory === 'All' || v.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                vehiclesContainer.innerHTML = `
                    <div class="py-20 text-center">
                        <i class="fa-solid fa-car-burst text-6xl text-gta-border mb-4"></i>
                        <h2 class="font-gta text-3xl text-slate-400 tracking-wider">No Vehicles Found</h2>
                        <p class="text-slate-500 mt-2 font-bold uppercase">Adjust your filters or search term.</p>
                    </div>
                `;
                return;
            }

            // Group by Category
            const grouped = {};
            filtered.forEach(v => {
                if (!grouped[v.category]) grouped[v.category] = [];
                grouped[v.category].push(v);
            });

            // Sort Groups to match the original category order
            const groupKeys = Object.keys(grouped).sort((a, b) => {
                if (a === 'Custom Pack') return -1;
                if (b === 'Custom Pack') return 1;
                return a.localeCompare(b);
            });

            // Build HTML
            let html = '';
            groupKeys.forEach(category => {
                const vehicles = grouped[category];
                const icon = getIconForCategory(category);
                
                html += `
                    <div class="mb-12">
                        <!-- Section Header -->
                        <div class="flex items-center gap-4 mb-6 border-b border-gta-border pb-2">
                            <div class="text-gta-green text-2xl">${icon}</div>
                            <h2 class="font-gta text-4xl text-white tracking-widest uppercase">${category}</h2>
                            <div class="ml-auto bg-gta-panel text-slate-400 px-3 py-1 rounded text-sm font-bold border border-gta-border">
                                ${vehicles.length} VEHICLES
                            </div>
                        </div>
                        
                        <!-- Grid -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                            ${vehicles.map(v => `
                                <div class="vehicle-card bg-gta-panel border border-gta-border p-5 rounded-sm flex flex-col justify-between h-full">
                                    <div class="mb-4">
                                        <h3 class="font-gta text-2xl text-white tracking-wide leading-tight mb-1">${v.name}</h3>
                                        <div class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-3">
                                            Brand: <span class="text-slate-300">${v.category}</span>
                                        </div>
                                    </div>
                                    
                                    <div class="mt-auto">
                                        <div class="bg-gta-dark p-3 rounded-sm border border-black flex justify-between items-center group/code">
                                            <div class="font-mono text-gta-orange font-bold truncate pr-4">
                                                ${v.spawn}
                                            </div>
                                            <button 
                                                onclick="copySpawnCode('${v.spawn}')"
                                                class="text-slate-400 hover:text-gta-green transition-colors cursor-pointer p-2"
                                                title="Copy Spawn Code"
                                            >
                                                <i class="fa-solid fa-copy text-lg"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            vehiclesContainer.innerHTML = html;
        }

        // Copy functionality with visual feedback
        let toastTimeout;
        window.copySpawnCode = (text) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => showToast(text));
            } else {
                // Fallback
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast(text);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                textArea.remove();
            }
        };

        function showToast(text) {
            toastMessage.textContent = text;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Run
        init();

    </script>
</body>
</html>
