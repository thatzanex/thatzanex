name: Deploy KarateHub

on:
  push:
    paths:
      - 'karate/**'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          cd karate
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: karate/dist # The folder the action should deploy.
          target-folder: karate # The folder in the branch to deploy to.
          branch: gh-pages # The branch the action should deploy to.
